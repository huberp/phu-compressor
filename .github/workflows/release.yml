name: Release

on:
  push:
    tags:
      - 'v[0-9]*'   # e.g. v1.0.0, v0.2.1-beta

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ---------------------------------------------------------------------------
  # Build & package Windows x64 VST3
  # ---------------------------------------------------------------------------
  release-windows-x64:
    name: Windows x64 VST3
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (x64)
        run: cmake --preset vs2026-x64

      - name: Build Release
        run: cmake --build --preset release

      - name: Validate VST3 with pluginval
        shell: pwsh
        run: |
          Write-Host "Downloading pluginval..."
          Invoke-WebRequest `
            -Uri "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip" `
            -OutFile "pluginval.zip"
          Expand-Archive -Path "pluginval.zip" -DestinationPath "pluginval" -Force

          $vst3 = Get-ChildItem -Recurse `
            -Path "build/vs2026-x64/src/phu-compressor_artefacts/Release/VST3" `
            -Filter "*.vst3" -Directory | Select-Object -First 1 -ExpandProperty FullName

          Write-Host "Validating: $vst3"
          .\pluginval\pluginval.exe --strictness-level 5 --validate-in-process --validate "$vst3"

      - name: Package VST3
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $zipName = "PHU-COMPRESSOR-windows-x64-${version}.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path staging | Out-Null

          $vst3 = Get-ChildItem -Recurse `
            -Path "build/vs2026-x64/src/phu-compressor_artefacts/Release/VST3" `
            -Filter "*.vst3" -Directory | Select-Object -First 1

          Copy-Item -Path $vst3.FullName -Destination "staging" -Recurse
          Compress-Archive -Path "staging\*" -DestinationPath "dist\$zipName" -Force
          Write-Host "Created dist\$zipName"

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-vst3
          path: dist/*.zip

  # ---------------------------------------------------------------------------
  # Build & package Windows ARM64 VST3 (cross-compiled on x64 runner)
  # ---------------------------------------------------------------------------
  release-windows-arm64:
    name: Windows ARM64 VST3
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (ARM64 cross-compile)
        run: cmake -B build-arm64 -DCMAKE_BUILD_TYPE=Release -A ARM64

      - name: Build Release
        run: cmake --build build-arm64 --config Release

      - name: Package VST3
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $zipName = "PHU-COMPRESSOR-windows-arm64-${version}.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path staging | Out-Null

          $vst3 = Get-ChildItem -Recurse `
            -Path "build-arm64" `
            -Filter "*.vst3" -Directory | Select-Object -First 1

          Copy-Item -Path $vst3.FullName -Destination "staging" -Recurse
          Compress-Archive -Path "staging\*" -DestinationPath "dist\$zipName" -Force
          Write-Host "Created dist\$zipName"

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-vst3
          path: dist/*.zip

  # ---------------------------------------------------------------------------
  # Build & package Linux VST3
  # ---------------------------------------------------------------------------
  release-linux:
    name: Linux VST3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: sudo bash scripts/install-linux-deps.sh

      - name: Configure CMake
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-build

      - name: Package VST3
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ZIP_NAME="PHU-COMPRESSOR-linux-${VERSION}.zip"
          mkdir -p dist

          VST3_PATH=$(find build/linux-release/src/phu-compressor_artefacts/Release/VST3 \
            -name "*.vst3" -type d | head -n 1)

          if [ -z "$VST3_PATH" ]; then
            echo "ERROR: VST3 bundle not found"
            exit 1
          fi

          echo "Packaging: $VST3_PATH"
          (cd "$(dirname "$VST3_PATH")" && zip -r "$GITHUB_WORKSPACE/dist/$ZIP_NAME" \
            "$(basename "$VST3_PATH")")

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-vst3
          path: dist/*.zip

  # ---------------------------------------------------------------------------
  # Generate README.pdf, inject into all zips, publish GitHub Release
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: [release-windows-x64, release-windows-arm64, release-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-vst3
          path: dist/

      - name: Download Windows ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64-vst3
          path: dist/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-vst3
          path: dist/

      - name: Generate README.pdf
        run: |
          npm install -g md-to-pdf
          md-to-pdf README.md --dest README.pdf

      - name: Inject README.pdf into all release zips
        run: |
          for zip in dist/*.zip; do
            zip -j "$zip" README.pdf
            echo "Injected README.pdf into $zip"
          done

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: phu-compressor ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## phu-compressor ${{ github.ref_name }}

            ### Installation

            **Windows x64** — download `PHU-COMPRESSOR-windows-x64-*.zip`, extract and copy
            `PHU COMPRESSOR.vst3` to `C:\Program Files\Common Files\VST3\`.

            **Windows ARM64** — download `PHU-COMPRESSOR-windows-arm64-*.zip`, extract and copy
            `PHU COMPRESSOR.vst3` to `C:\Program Files\Common Files\VST3\`.

            **Linux** — download `PHU-COMPRESSOR-linux-*.zip`, extract and copy
            `PHU COMPRESSOR.vst3` to `~/.vst3/`.

            Each zip contains the `.vst3` bundle and a `README.pdf` with full documentation.

            ### Prerequisite (Windows)

            Requires the [Visual C++ 2015–2022 Redistributable (x64)](https://aka.ms/vs/17/release/vc_redist.x64.exe).

            ### What's Changed

            See [CHANGELOG](https://github.com/huberp/phu-compressor/commits/${{ github.ref_name }})
            or compare against the previous tag.
          files: dist/*.zip
